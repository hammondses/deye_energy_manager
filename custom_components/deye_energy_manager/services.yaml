apply_plan_now:
  name: Apply plan now
  description: Applies the current decision through enabled and gated control paths.
clear_ev_latch:
  name: Clear EV latch
  description: Clears the in-memory EV grid-mode latch.
test_one_pv_load:
  name: Test one PV load
  description: Requests one heat load as a PV/load probe. The integration only calls this automatically when load-test control is enabled.
rotate_heat_load:
  name: Rotate heat load
  description: Requests shedding one satisfied solar-owned load and adding one colder priority load.
